<section class="page-title">
  <h2>Add Institution</h2>
</section>

<section class="institution-form-card">
  <div id="institutions-feedback" class="institution-message hidden" role="status"></div>
  <div id="institution-form-notice" class="institution-form-notice hidden" role="status"></div>

  <form id="add-institution-form" class="institution-form">
    <label class="institution-label" for="institution-name">Name
      <input id="institution-name" name="name" type="text" required />
    </label>

    <label class="institution-label" for="institution-city">City
      <input id="institution-city" name="city" type="text" />
    </label>

    <label class="institution-label" for="institution-state">State
      <input id="institution-state" name="stateProvince" type="text" />
    </label>

    <label class="institution-label" for="institution-type">Institution Type
      <select id="institution-type" name="institutionType">
        <option value=""></option>
        <option value="university_hospital">University Hospital</option>
        <option value="academic_medical_center">Academic Medical Center</option>
        <option value="teaching_hospital">Teaching Hospital</option>
        <option value="community_hospital">Community Hospital</option>
        <option value="regional_medical_center">Regional Medical Center</option>
        <option value="tertiary_referral_center">Tertiary Referral Center</option>
        <option value="quaternary_referral_center">Quaternary Referral Center</option>
        <option value="veterans_hospital">Veterans Hospital</option>
        <option value="military_hospital">Military Hospital</option>
        <option value="childrens_hospital">Children's Hospital</option>
        <option value="cancer_center">Cancer Center</option>
        <option value="heart_hospital">Heart Hospital</option>
        <option value="specialty_hospital">Specialty Hospital</option>
        <option value="integrated_health_system">Integrated Health System</option>
        <option value="private_hospital">Private Hospital</option>
        <option value="public_hospital">Public Hospital</option>
        <option value="government_hospital">Government Hospital</option>
        <option value="research_institute">Research Institute</option>
        <option value="medical_school">Medical School</option>
        <option value="physician_practice">Physician Practice</option>
        <option value="multispecialty_group">Multispecialty Group</option>
        <option value="ambulatory_surgery_center">Ambulatory Surgery Center</option>
        <option value="international_training_program">International Training Program</option>
        <option value="other">Other</option>
      </select>
    </label>

    <label class="institution-label" for="institution-contact-email">Contact Email
      <input id="institution-contact-email" name="contactEmail" type="email" />
    </label>

    <label class="institution-label" for="institution-website">Website
      <input id="institution-website" name="website" type="url" />
    </label>

    <label class="institution-checkbox">
      <input id="institution-active" name="isActive" type="checkbox" checked />
      <span>Active institution</span>
    </label>

    <div class="institution-form-actions">
      <button type="button" id="cancel-add-institution" class="button button-secondary">Clear</button>
      <button type="submit" class="button button-primary">Add Institution</button>
    </div>
  </form>
</section>
